services:
  postgres:
    image: postgres:16
    container_name: silesia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: silesia-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION}
      GCS_RAW_BUCKET: ${GCS_RAW_BUCKET}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW}
      BQ_DATASET_STAGING: ${BQ_DATASET_STAGING}
      BQ_DATASET_MARTS: ${BQ_DATASET_MARTS}
    volumes: &airflow-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./scraper:/opt/airflow/scraper
      - ./keys:/opt/airflow/keys:ro
      - ./data:/opt/airflow/data
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        if ! whoami &> /dev/null; then
          echo 'airflow:x:'$(id -u)':0:airflow:/home/airflow:/bin/bash' >> /etc/passwd
        fi
        export HOME=/home/airflow
        airflow db migrate
        airflow users create --username ${_AIRFLOW_WWW_USER_USERNAME} --password ${_AIRFLOW_WWW_USER_PASSWORD} --firstname Admin --lastname User --role Admin --email admin@example.com
    user: "${AIRFLOW_UID}:0"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: silesia-airflow-webserver
    depends_on:
      - airflow-init
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    command: webserver
    user: "${AIRFLOW_UID}:0"
    restart: always

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: silesia-airflow-scheduler
    depends_on:
      - airflow-init
    environment: *airflow-env
    volumes: *airflow-volumes
    command: scheduler
    user: "${AIRFLOW_UID}:0"
    restart: always

volumes:
  postgres-db-volume:
